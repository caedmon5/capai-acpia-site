{% extends "base.html" %}
{% block title %}Contact — {{ site.short_name }}{% endblock %}

{% block content %}
<section class="hero">
  <div class="container">
    <h1>{{ page.title }}</h1>
    <p>{{ page.subtitle }}</p>
  </div>
</section>

<section>
  <div class="container contact-container">
    <p class="contact-intro">
      Interested in getting involved? Write to us.
    </p>
    {% for c in site.contacts %}
    <div class="contact-card">
      <h3>{{ c.name }}</h3>
      <a href="mailto:{{ c.email }}">{{ c.email }}</a>
    </div>
    {% endfor %}
  </div>
</section>
{% endblock %}
