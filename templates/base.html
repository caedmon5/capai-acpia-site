<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}{{ site.short_name }}{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Montserrat:wght@600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header class="site-header">
  <div class="container">
    <a href="index.html" class="logo">
      <img src="{{ site.logo }}" alt="{{ site.short_name }} Logo">
    </a>
    <button class="nav-toggle" aria-label="Toggle navigation" onclick="document.querySelector('.main-nav').classList.toggle('open')">&#9776;</button>
    <nav class="main-nav">
      {% for item in site.nav %}
      <a href="{{ item.page }}.html"{% if active_page == item.page %} class="active"{% endif %}>{{ item.label }}</a>
      {% endfor %}
    </nav>
  </div>
</header>

{% block content %}{% endblock %}

<footer class="site-footer">
  <div class="container">
    <div class="footer-logo">
      <img src="{{ site.footer_logo }}" alt="{{ site.short_name }}">
    </div>
    {% if site.contacts %}
    <h3 style="color:var(--clr-white); margin-bottom:.75rem;">Contact us</h3>
    <div class="footer-contact">
      {% for c in site.contacts %}
      {{ c.name }}: <a href="mailto:{{ c.email }}">{{ c.email }}</a>{% if not loop.last %}<br>{% endif %}
      {% endfor %}
    </div>
    {% endif %}
  </div>
</footer>

</body>
</html>
