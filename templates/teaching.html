{% extends "base.html" %}
{% block title %}{{ page.title }} &ndash; {{ site.short_name }}{% endblock %}

{% block content %}
<div class="hero">
  <div class="container">
    <h1>{{ page.title }}</h1>
    <p>{{ page.subtitle }}</p>
  </div>
</div>

<section>
  <div class="container">
    {% if page.placeholder %}
    <p style="text-align:center; color:var(--clr-muted); font-size:1.1rem; padding:2rem 0;">{{ page.placeholder }}</p>
    {% endif %}
  </div>
</section>
{% endblock %}
