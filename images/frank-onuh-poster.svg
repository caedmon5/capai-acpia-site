<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1e1e1e"/>
      <stop offset="100%" stop-color="#2a2a2a"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="600" fill="url(#bg)"/>

  <!-- Accent bar top -->
  <rect width="800" height="6" fill="#cf291e"/>

  <!-- Accent bar bottom -->
  <rect y="594" width="800" height="6" fill="#cf291e"/>

  <!-- Left accent stripe -->
  <rect x="60" y="80" width="4" height="440" fill="#cf291e"/>

  <!-- Series label -->
  <text x="84" y="112" font-family="Inter, sans-serif" font-size="14" font-weight="500" fill="#cf291e" letter-spacing="3">NEXT TALK ONLINE SPEAKER SERIES</text>

  <!-- Title -->
  <text x="84" y="175" font-family="Inter, sans-serif" font-size="40" font-weight="600" fill="#ffffff">Datacolonialism vs. Data-Company-town</text>

  <!-- Divider -->
  <rect x="84" y="200" width="120" height="2" fill="#cf291e"/>

  <!-- Speaker -->
  <text x="84" y="245" font-family="Inter, sans-serif" font-size="20" font-weight="500" fill="#ffffff">Frank Onuh</text>
  <text x="84" y="272" font-family="Inter, sans-serif" font-size="16" fill="#aaaaaa">PhD Researcher, University of Lethbridge</text>

  <!-- Abstract -->
  <text x="84" y="320" font-family="Inter, sans-serif" font-size="15" fill="#cccccc">
    <tspan x="84" dy="0">Lessons learned from poor web design follow-through</tspan>
    <tspan x="84" dy="24">with non-technical customers.</tspan>
  </text>

  <!-- Date/Time/Location block -->
  <rect x="84" y="400" width="632" height="100" rx="0" fill="#cf291e" opacity="0.12"/>
  <text x="110" y="435" font-family="Inter, sans-serif" font-size="18" font-weight="600" fill="#cf291e">Thursday, April 10, 2026</text>
  <text x="110" y="462" font-family="Inter, sans-serif" font-size="16" fill="#ffffff">3:00 PM  ·  Digital Humanities Lab, B838</text>
  <text x="110" y="486" font-family="Inter, sans-serif" font-size="14" fill="#aaaaaa">In-person only</text>

  <!-- CAPAI branding -->
  <text x="84" y="556" font-family="Inter, sans-serif" font-size="13" fill="#666666">Canadian Association for the Philosophy of AI  ·  CAPAI-ACPIA</text>
</svg>
