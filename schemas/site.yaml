# Schema: Site-wide Settings
# Defines global site configuration. The assistant uses this when the
# user wants to change site name, contacts, navigation, logos, or
# the homepage intro text.

trigger_phrases:
  - change the site name
  - update contact info
  - change the logo
  - edit the intro text
  - add a nav item
  - change navigation
  - reorder the menu
  - change the order
  - I want events first
  - move media before
  - add a page to the menu
  - remove a page from the menu

nav_triggers:
  - I want the order to be
  - move X before Y
  - put events first
  - add a contact page
  - I want members, research, teaching, events, media
  - change the menu

fields:
  name:
    type: string
    required: true
    prompt: "What should the full site name be?"

  short_name:
    type: string
    required: true
    prompt: "And the short version (used in page titles)?"

  logo:
    type: url
    required: true
    prompt: "URL for the header logo?"
    note: >
      For logo replacement, just ask for the new logo file or URL.

  footer_logo:
    type: url
    required: true
    prompt: "URL for the footer logo?"

  intro:
    type: object
    fields:
      en:
        type: text
        prompt: "What should the English intro text say?"
      fr:
        type: text
        prompt: "And the French version?"

  nav:
    type: list
    note: >
      Each item has a label (what the user sees) and a page (which
      HTML file it links to, without .html). Adding a nav item also
      means there should be a matching template and page config.

      When the user asks to reorder: they may list the order they want
      ("I want members, research, teaching, events, media, contact")
      or say relative things ("put events first," "move media before
      teaching"). Parse their intent and reorder the nav list in
      data/site.yaml accordingly.

      When adding a new nav item: create the page data file, ensure
      a template exists, and add it to the build script if needed.

  contacts:
    type: list
    note: "Each contact has a name and email."
    prompt: "Who should be listed as contacts?"

coherence_checks:
  - "If a nav item is added, verify a matching template and page data file exist."
  - "If a contact is removed, verify they aren't the only contact."
  - "If a nav item is removed, check if any other pages link to it."
  - "If nav order changes, rebuild all pages (the nav appears on every page)."

outputs:
  - file: "data/site.yaml"
  - pages_affected:
      - "All pages (header, footer, nav)"
