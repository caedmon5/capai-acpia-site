# Schema: Media / News Item
# Defines what a media entry needs. The assistant uses this when the
# user wants to add or manage news items and press mentions.

trigger_phrases:
  - add a news item
  - media mention
  - in the news
  - press coverage
  - add media
  - article about
  - one of our members was in
  - here's an article
  - someone wrote about

update_triggers:
  - change the description
  - update the link
  - fix the title
  - change the image

remove_triggers:
  - take that article down
  - remove that news item
  - that's outdated

fields:
  title:
    type: string
    required: true
    ask_user: true
    prompt: "What's the title of the article?"

  source:
    type: string
    required: true
    ask_user: true
    prompt: "Where was it published?"
    examples: "CBC News, Substack, university press, Globe and Mail"

  description:
    type: text
    required: false
    ask_user: true
    prompt: "What's it about, in a sentence or two?"

  url:
    type: url
    required: true
    ask_user: true
    prompt: "What's the link?"

  url_label:
    type: string
    required: false
    ask_user: false
    default: "Read Article"

  image:
    type: image
    required: false
    ask_user: false
    note: "Only ask if the user mentions one. Otherwise omit."

  order:
    type: integer
    required: true
    ask_user: false
    logic: "Set to one higher than the current highest order value."

outputs:
  - file: "data/media/{short-name}.yaml"
  - pages_affected:
      - "media.html"
