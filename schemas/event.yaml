# Schema: Event / Talk / Workshop
# Defines what an event page needs. The assistant uses this to guide
# the conversation when a user wants to add, update, or manage events.

trigger_phrases:
  - add a talk
  - add an event
  - add a lecture
  - add a workshop
  - schedule a speaker
  - new event
  - upcoming talk
  - we have someone presenting
  - we have someone coming

update_triggers:
  - change the date
  - change the title
  - change the speaker
  - change the location
  - moved online
  - moved to zoom
  - change the time
  - update the event
  - new abstract
  - here's the abstract
  - here's a bio
  - here's a photo

lifecycle_triggers:
  - take it down
  - it's over
  - move to past
  - promote the next one
  - event happened
  - that one's done
  - archive it

fields:
  slug:
    type: string
    required: true
    ask_user: false
    derive_from: >
      For single-speaker events, derive from speaker name (e.g., frank-onuh).
      For workshops or multi-speaker events, derive from title
      (e.g., contemporary-debates-philosophy-ai). Always lowercase, hyphenated.
    example: frank-onuh

  title:
    type: string
    required: true
    ask_user: true
    prompt: "What's the title of the talk?"
    followup_if_vague: >
      That sounds like a working title — should I use it as-is on the
      website, or is there a final version coming?

  series:
    type: string
    required: true
    ask_user: false
    default: "CAPAI-ACPIA Speaker Series"
    note: >
      Use "CAPAI-ACPIA Workshop" for workshops. If the user describes
      something that isn't a standard talk (workshop, panel, conference),
      adjust accordingly.

  speaker:
    type: string
    required: false
    ask_user: true
    prompt: "Who's the speaker?"
    note: >
      Not required for workshops or multi-speaker events. For workshops,
      use "TBA" or list organizers. For panels, list panelists or say
      "Multiple speakers."

  speaker_title:
    type: string
    required: false
    ask_user: true
    prompt: "What's their title or position?"

  speaker_affiliation:
    type: string
    required: false
    ask_user: true
    prompt: "What institution are they at?"

  speaker_photo:
    type: image
    required: false
    ask_user: true
    prompt: "Do you have a photo of the speaker?"
    note: >
      If a file is provided, save to images/ directory.
      If a URL is provided, use it directly.
      For photo replacement: just ask for the new photo and swap it.

  date:
    type: string
    required: true
    ask_user: true
    prompt: "What date?"
    format: "Day-of-week, Month DD, YYYY (e.g., Thursday, April 10, 2026)"
    validation: >
      If the user says something relative like "next Thursday" or
      "May 1," convert to full date and confirm: "That would be
      Friday, May 1, 2026 — does that look right?"

  time:
    type: string
    required: true
    ask_user: true
    prompt: "What time?"
    example: "3:00 PM"
    note: >
      For all-day or multi-hour events like workshops, use range format:
      "9:30 AM - 5:00 PM"

  location:
    type: string
    required: true
    ask_user: true
    prompt: "Where is it being held?"
    note: >
      For online events, use "Virtual (Zoom)" or similar.
      For in-person, include room/building and university:
      "Leacock Room 927, McGill University"

  format:
    type: string
    required: true
    ask_user: true
    prompt: "Is this in-person, online, or hybrid?"
    options:
      - In-person only
      - Online
      - Hybrid

  status:
    type: string
    required: true
    ask_user: false
    default: upcoming
    options:
      - upcoming
      - past

  featured:
    type: boolean
    required: true
    ask_user: false
    default: false
    logic: >
      Set to true if this is the next upcoming event. Only one event
      should be featured at a time. If setting this to true, set all
      other events' featured to false.

  registration_url:
    type: url
    required: false
    ask_user: conditional
    condition: "Only ask if format is Online or Hybrid"
    prompt: "Do you have a registration or Zoom link?"

  poster_image:
    type: image
    required: false
    ask_user: false
    note: Only add if user provides one.

  abstract:
    type: text
    required: false
    ask_user: true
    prompt: "Do you have an abstract or description? Even a sentence or two is fine."
    if_missing: "Use 'Details coming soon.' as placeholder text."

  bio:
    type: text
    required: false
    ask_user: true
    prompt: "Do you have a short bio for the speaker?"
    if_missing: "Construct a minimal one from speaker_title and speaker_affiliation."

coherence_checks:
  - "If title changes, verify abstract still describes the same topic."
  - "If format changes, verify location and registration_url are consistent."
  - "If date changes, verify day-of-week is correct."
  - "If speaker changes, verify bio, photo, title, and affiliation match."
  - "If status changes to past, check if featured should shift to another event."
  - "If a new event is added that is sooner than the current featured event, suggest swapping."

lifecycle:
  move_to_past:
    description: >
      When an event's date has passed, or user says "take it down" / "it's done":
      1. Change status from "upcoming" to "past"
      2. Set featured to false
      3. Check: is there another upcoming event that should now be featured?
      4. If yes, set that one to featured and tell the user:
         "I've moved it to past events and put [next event] on the homepage."
      5. If no upcoming events remain, tell the user:
         "That was the last upcoming event — the homepage won't show a
         featured event until you add a new one."
  proactive:
    - "If an event's date has passed but status is still 'upcoming', mention it."
    - "If the homepage has no featured event, suggest one."

outputs:
  - file: "data/events/{slug}.yaml"
  - pages_affected:
      - "event-{slug}.html (dedicated event page)"
      - "events.html (listing)"
      - "index.html (if featured)"
