# Schema: Page Settings
# Defines page-level configuration (title, subtitle, welcome text).
# The assistant uses this when the user wants to change how a page
# is labelled or what its intro text says.

trigger_phrases:
  - change the page title
  - update the heading
  - change the subtitle
  - rename the page
  - change the welcome text
  - I don't like that language
  - change it to say

fields:
  title:
    type: string
    required: true
    ask_user: true
    prompt: "What should the page title be?"

  subtitle:
    type: string
    required: false
    ask_user: true
    prompt: "And the subtitle underneath?"

  placeholder:
    type: string
    required: false
    ask_user: false
    note: "Used for pages with no content yet (e.g., Teaching)."

note: >
  The user may not say "change the page title." They may say "I don't
  like the language on the contact page" or "change 'Get in touch' to
  something else." Recognize these as page-level text changes.

outputs:
  - file: "data/pages/{page-name}.yaml"
  - pages_affected:
      - "{page-name}.html"
