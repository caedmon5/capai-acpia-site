abstract: >
  This talk examines the roots of the "datacolonialism" metaphor and argues
  that it misunderstands both colonialism and how exploitative data practices
  work in the platform economy. Instead it proposes the idea of the "Data
  Company Town": a form of rentier capitalism that trades convenience for
  exploitation.

bio: >
  Frank Onuh is a PhD researcher at the University of Lethbridge, affiliated
  with the Humanities Innovation Lab. His doctoral research centres on
  decolonizing information verification practices in Africa, developing
  intelligent systems for automated fact-checking that capture the African
  experience. He is the founder and Executive Director of the AIRI Foundation,
  focused on AI literacy, digital empowerment, and misinformation studies, and
  a DRI EDIA Champion funded by the Digital Research Alliance of Canada. His
  published work includes "Scarlet Cloak and the Forest Adventure: A
  Preliminary Study of the Impact of AI on Commonly Used Writing Tools"
  (Springer, International Journal of Educational Technology in Higher
  Education, 2025), co-authored with colleagues at the Humanities Innovation Lab.
