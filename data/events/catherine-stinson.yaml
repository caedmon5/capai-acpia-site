abstract: >
  Millions of people are turning to chatbots for mental health support. These
  tools promise accessibility, affordability, and scalability — but raise
  serious concerns about safety, effectiveness, and algorithmic bias affecting
  marginalized communities who need mental healthcare access most.

bio: >
  Catherine Stinson is an Assistant Professor in the School of Computing &
  Philosophy Department at Queen's University.
